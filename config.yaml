data:
  raw_path: data/raw/laptop_data.csv
  synthetic:
    enabled: true
    n_rows: 1300
    seed: 42
  target: Price
  numeric_features:
    - Ram
    - Weight
    - Inches
    - ppi
    - SSD
    - HDD
    - Touchscreen
    - Ips
    - Cpu_rank
  categorical_features:
    - Company
    - TypeName
    - Gpu_brand
    - Os
  test_size: 0.2
  random_state: 42
model:
  task: regression
  time_budget_s: 60
  metric: r2
  estimator_list:
    - lgbm
  ensemble: false
  log_target: true
  monotone_increasing:
    - Ram
    - SSD
    - HDD
    - ppi
    - Cpu_rank
  artifact_dir: model/artifacts
  artifact_name: model.joblib
  metrics_name: metrics.json
  seed: 42
validation:
  min_rows: 100
  min_r2: 0.7
  max_mae: 25000
tracking:
  mlflow:
    enabled: true
    tracking_uri: mlruns
    experiment_name: laptop-price-automl
api:
  host: 0.0.0.0
  port: 8000
ui:
  api_url: http://localhost:8000
