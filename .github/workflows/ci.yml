name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Lint (pylint >= 8)
        run: pylint config.py data model app --fail-under=8
      - name: Tests
        run: pytest
