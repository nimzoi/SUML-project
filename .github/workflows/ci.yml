name: CI/CD

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/laptop-price

permissions:
  contents: read
  packages: write

jobs:
  quality:
    name: Lint and tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Validate configuration files
        run: |
          python - <<'PY'
          from pathlib import Path
          import tomllib
          import yaml

          tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          yaml.safe_load(Path("config.yaml").read_text(encoding="utf-8"))
          yaml.safe_load(Path("docker-compose.yml").read_text(encoding="utf-8"))
          PY
      - name: Lint (pylint >= 8)
        run: pylint config.py data model app --fail-under=8
      - name: Tests
        run: pytest

  publish-image:
    name: Build and publish Docker image
    needs: quality
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
